services:
  ts-ha:
    image: tailscale/tailscale:latest
    hostname: ts-ha
    cap_add: [ "NET_ADMIN", "SYS_MODULE" ]
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ts_state:/var/lib/tailscale
      - ./certs:/staging-certs:ro
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${HA_AUTHKEY}
      - TS_HOSTNAME=ha
      - TS_ACCEPT_DNS=true
      - TS_AUTH_ONCE=true
      - TS_EXTRA_ARGS=--login-server=https://${HEADSCALE_DOMAIN}
      - SSL_CERT_DIR=${SSL_CERT_DIR}
      - TS_USERSPACE=false
      - TS_TAILSCALED_EXTRA_ARGS=--tun=tailscale0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  traefik-tailnet:
    image: traefik:v3.6.9
    network_mode: "service:ts-ha"
    command:
      - "--entrypoints.web.address=:8080"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--log.level=INFO"
    volumes:
      - ./traefik-tailnet/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      - ts-ha
    restart: unless-stopped

  consul-register:
    image: curlimages/curl:8.8.0
    network_mode: "service:ts-ha"
    environment:
      - CONSUL_ADDR=http://${INFRA_VPS_TAILNET_IP}:8500
      - SERVICE_NAME=homeassistant
      - SERVICE_ID=homeassistant-ha
      - SERVICE_HOST=ha.${TAILNET_DOMAIN}
      - SERVICE_PORT=8080
      - ROUTE_HOST=ha.${LAB_DOMAIN}
    command: >
      sh -c '
        RULE=$(echo "Host(__H__)" | sed "s/__H__/\`$$ROUTE_HOST\`/");
        PAYLOAD="{
          \"Name\": \"$$SERVICE_NAME\",
          \"ID\": \"$$SERVICE_ID\",
          \"Address\": \"$$SERVICE_HOST\",
          \"Port\": $$SERVICE_PORT,
          \"Tags\": [
            \"traefik.enable=true\",
            \"traefik.http.routers.$$SERVICE_NAME.rule=$$RULE\",
            \"traefik.http.routers.$$SERVICE_NAME.entrypoints=websecure\",
            \"traefik.http.routers.$$SERVICE_NAME.tls=true\",
            \"traefik.http.routers.$$SERVICE_NAME.tls.certresolver=dns\"
          ],
          \"Check\": {
            \"TCP\": \"$$SERVICE_HOST:$$SERVICE_PORT\",
            \"Interval\": \"10s\",
            \"DeregisterCriticalServiceAfter\": \"2m\"
          }
        }";
        while true; do
          if curl -sf -X PUT "$$CONSUL_ADDR/v1/agent/service/register" \
               -H "Content-Type: application/json" \
               -d "$$PAYLOAD"; then
            echo "Registered $$SERVICE_ID";
          else
            echo "Failed to register $$SERVICE_ID, retrying in 60s...";
          fi;
          sleep 60;
        done
      '
    depends_on:
      - ts-ha
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    network_mode: "service:ts-ha"
    command: ["-config.file=/etc/promtail/promtail.yml"]
    volumes:
      - ./tailnet/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /run/systemd/journal:/run/systemd/journal:ro
      - /usr/share/hassio/homeassistant:/ha-config:ro
    depends_on:
      - ts-ha
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    network_mode: "service:ts-ha"
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    depends_on:
      - ts-ha
    restart: unless-stopped

  traefik-lan:
    image: traefik:v3.6.9
    network_mode: host
    command:
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--certificatesresolvers.stepca.acme.caserver=https://${PKI_IP}:9000/acme/acme/directory"
      - "--certificatesresolvers.stepca.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.stepca.acme.storage=/acme/acme.json"
      - "--certificatesresolvers.stepca.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
    environment:
      - LEGO_CA_CERTIFICATES=/certs/root_ca.crt
    volumes:
      - ./traefik-lan/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_lan_acme:/acme
      - ./certs/root_ca.crt:/certs/root_ca.crt:ro
    restart: unless-stopped

  # ── ts-ha watchdog: force-recreate dependents on netns drift ──
  # Detects drift by comparing each dependent's HostConfig.NetworkMode
  # ("container:<id>") against ts-ha's current container ID. Self-heals
  # on its own first poll (so a coordinated stack restart, e.g. watchtower,
  # cannot leave dependents pinned to an orphaned netns inode), silently
  # no-ops in steady state. Also restarts dependents stuck in non-running
  # status (e.g. Created-but-never-started after a midway compose failure).
  ts-ha-watchdog:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
    working_dir: ${PWD}
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache docker-cli-compose >/dev/null
        DEPS="consul-register traefik-tailnet promtail node-exporter"
        echo "[watchdog] ready, polling dependents every 10s ($$DEPS)"
        while true; do
          TS_ID=$$(docker inspect cn-ha-sidecar-ts-ha-1 --format "{{.Id}}" 2>/dev/null || true)
          if [ -n "$$TS_ID" ]; then
            NEED_RECREATE=""
            NEED_START=""
            for dep in $$DEPS; do
              INFO=$$(docker inspect cn-ha-sidecar-$$dep-1 --format "{{.HostConfig.NetworkMode}} {{.State.Status}}" 2>/dev/null || true)
              [ -n "$$INFO" ] || continue
              DEP_NM=$$(echo "$$INFO" | awk "{print \$$1}")
              DEP_STATUS=$$(echo "$$INFO" | awk "{print \$$2}")
              DEP_TARGET=$${DEP_NM#container:}
              if [ "$$DEP_TARGET" != "$$TS_ID" ]; then
                NEED_RECREATE="$$NEED_RECREATE $$dep"
              elif [ "$$DEP_STATUS" != "running" ]; then
                NEED_START="$$NEED_START $$dep"
              fi
            done
            if [ -n "$$NEED_RECREATE" ]; then
              echo "[watchdog] netns drift on:$$NEED_RECREATE -- recreating"
              docker compose -p cn-ha-sidecar up -d --force-recreate --no-deps $$NEED_RECREATE \
                && echo "[watchdog] recreate OK" || echo "[watchdog] recreate FAILED"
            fi
            if [ -n "$$NEED_START" ]; then
              echo "[watchdog] stopped on:$$NEED_START -- starting"
              docker compose -p cn-ha-sidecar start $$NEED_START \
                && echo "[watchdog] start OK" || echo "[watchdog] start FAILED"
            fi
          fi
          sleep 10
        done
    restart: unless-stopped

volumes:
  ts_state:
  traefik_lan_acme:
